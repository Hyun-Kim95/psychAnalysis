spring.application.name=psychAnalysis

# 리버스 프록시 뒤에서 문의 등록 IP·링크 등을 올바르게 쓰려면 설정 (운영 Nginx 등)
server.forward-headers-strategy=framework

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
# spring.datasource.url=jdbc:postgresql://localhost:5432/psychdb
# spring.datasource.username=psychuser
# spring.datasource.password=psychpass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Flyway 복구(Railway 등 히스토리 손상 시) ---
# 체크섬만 틀어진 경우(히스토리 행은 있음): 한 번만 true로 두고 재배포 후 반드시 끈다.
psychanalysis.flyway.repair-before-migrate=${PSYCHANALYSIS_FLYWAY_REPAIR_BEFORE_MIGRATE:false}
# 스키마는 이미 V33까지 반영됐는데 flyway_schema_history가 망가진 경우:
# 1) Postgres에서 public.flyway_schema_history 테이블 DROP (또는 TRUNCATE는 상황에 따라 baseline이 안 될 수 있음 → DROP 권장)
# 2) 아래 두 변수를 설정한 뒤 한 번 배포 → V34 이후만 실행됨
# 3) 성공 후 BASELINE 변수는 false로 되돌린다.
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=${SPRING_FLYWAY_BASELINE_VERSION:1}

server.port=${PORT:8080}